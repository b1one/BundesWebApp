<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e40af">
    <meta name="description" content="BundesWahlApp - Sichere digitale Stimmabgabe mit eID">
    <title>BundesWahlApp</title>
    
    <!-- 1. BASISTECHNOLOGIE: Tailwind CSS für das Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. SCHRIFTART: Inter (Offizieller, sauberer Look) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 3. ICONS: Phosphor Icons (Zuverlässig und professionell) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* --- NATIVE APP FEEL OPTIMIZATIONS --- */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9; /* Slate-100 */
            -webkit-tap-highlight-color: transparent; /* Kein Tap-Highlight on Mobile */
            -webkit-user-select: none; /* Keine Textauswahl wie in nativen Apps */
            user-select: none;
            overscroll-behavior-y: none; /* Kein "Bounce" beim Scrollen am Rand */
        }

        /* Verstecke Scrollbar für saubereren Look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* --- ANIMATIONEN --- */
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* PersoSim / NFC Animation */
        .nfc-ripple {
            position: absolute;
            border: 4px solid rgba(59, 130, 246, 0.5); /* Blue-500 */
            border-radius: 50%;
            animation: ripple 2s infinite;
            opacity: 0;
        }
        .nfc-ripple:nth-child(2) { animation-delay: 0.5s; }
        .nfc-ripple:nth-child(3) { animation-delay: 1s; }

        @keyframes ripple {
            0% { width: 50px; height: 50px; opacity: 0.8; border-width: 4px; }
            100% { width: 300px; height: 300px; opacity: 0; border-width: 0px; }
        }

        /* Pin Pad Styling */
        .pin-btn {
            transition: all 0.15s ease;
            background: white;
            border-bottom: 2px solid #e2e8f0;
        }
        .pin-btn:active {
            transform: scale(0.95);
            background: #f8fafc;
            border-bottom: 0px solid transparent;
            margin-top: 2px;
        }
        
        /* Desktop-Frame Simulation (nur sichtbar auf großen Screens) */
        @media (min-width: 640px) {
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: #0f172a; /* Dark background for desktop presentation */
            }
            #app-root {
                width: 375px;
                height: 812px; /* iPhone X Maße */
                border-radius: 40px;
                overflow: hidden;
                position: relative;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                background-color: #f8fafc;
                border: 8px solid #1e293b;
            }
            /* Kleiner "Lautsprecher" oben */
            #app-root::before {
                content: '';
                position: absolute;
                top: 0; left: 50%; transform: translateX(-50%);
                width: 120px; height: 25px;
                background-color: #1e293b;
                border-bottom-left-radius: 16px;
                border-bottom-right-radius: 16px;
                z-index: 1000;
            }
        }
        @media (max-width: 639px) {
            #app-root { width: 100%; height: 100vh; }
        }
    </style>
</head>
<body>

    <!-- Die eigentliche App-Root -->
    <div id="app-root" class="flex flex-col h-screen bg-slate-50 text-slate-900 font-sans overflow-hidden">
        <!-- Inhalt wird durch JS injiziert -->
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
